<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Rock Paper Scissors Game</title>
   <style>
      body {
         text-align: center;
      }
      .container {
         background-color: antiquewhite;
         border: 4px solid rgba(0,0,0,0.1);
         margin: 20px;
      }
      button {
         background-color: skyblue;
         color: white;
         border: 1px solid rgba(0,0,0,0.1);
         padding: 10px 25px;
         margin-bottom: 10px;
         cursor: pointer;
      }
   </style>
</head>
<body>
   <div class="container">
      <h1>Rock paper scissors game</h1>
      <p>Open the browser console to see the game score results.</p>
      <p>This game has 5 rounds</p>
      <p>Have a nice play.</p>
      <button id="play-button">Play</button>
   </div>

   <script src="script.js"></script>
</body>
</html>
